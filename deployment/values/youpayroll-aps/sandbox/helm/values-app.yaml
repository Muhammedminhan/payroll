namespace: 'youpayroll-aps'

app_name: 'youpayroll-aps'
environment: 'sandbox'

service:
  name: 'youpayroll-aps-app'
  default:
    port: 8000
    protocol: 'TCP'
    targetPort: 8000

hpa:
  name: 'youpayroll-aps-app-hpa'
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

pdb:
  name: 'youpayroll-aps-app-pdb'
  minAvailable: 50%

deployment:
  name: 'youpayroll-aps-app-deployment'
  replicas: 3
  maxSurge: 100%
  maxUnavailable: 0%
  serviceAccountName: 'ygag-youpayroll-aps-vault'

  containers:
    default:
      name: 'app'
      imagePullPolicy: 'Always'
      image: '459037613883.dkr.ecr.ap-south-1.amazonaws.com/production/ygag/youpayroll-aps/backend-app:[BUILD_TAG]'
      command: '["sh", "-c", ". /vault/secrets/application.env ; . /vault/secrets/application-devops.env ; sh /ygag/deployment/app/app-entrypoint.sh"]'
      env:
        - name: 'DJANGO_SETTINGS_MODULE'
          value: 'youpayroll.settings.sandbox'
      port: 8000
      memory:
        requests: 500Mi
        limits: 800Mi
      cpu:
        requests: 100m
      health:
        path: '/health/'
        port: 8000
        scheme: 'HTTP'
      startupProbe:
        path: '/health/live/'
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 7
      readinessProbe:
        path: '/health/ready/'
        initialDelaySeconds: 0
        periodSeconds: 15
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 3
      livenessProbe:
        path: '/health/live/'
        initialDelaySeconds: 0
        periodSeconds: 15
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 4
      volumeMounts:
        - mountPath: '/ygag/logs/'
          name: 'ygag-youpayroll-aps-sandbox-app-logs'
        - name: 'youpayroll-aps-app-env-volume'
          mountPath: "/vault/secrets"

  volumes:
    - name: 'ygag-youpayroll-aps-sandbox-app-logs'
      hostPath:
        path: '/home/ec2-user/ygag-logs/ygag-youpayroll-aps-sandbox/app'
    - name: 'youpayroll-aps-app-env-volume'
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "youpayroll-aps-envs"

  nodeSelector:
    key: "karpenter.sh/nodepool"
    value: 'default'

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: 'topology.kubernetes.io/zone'
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: 'youpayroll-aps'
          tier: app

  priorityClassName: 'sandbox-medium'
  terminationGracePeriodSeconds: 60
