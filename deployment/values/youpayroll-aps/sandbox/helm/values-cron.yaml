namespace: 'youpayroll-aps'

app_name: 'youpayroll-aps'
environment: 'sandbox'

service:
  name: 'youpayroll-aps-cron'
  default:
    port: 8000
    protocol: 'TCP'
    targetPort: 8000

hpa:
  name: 'youpayroll-aps-cron-hpa'
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

pdb:
  name: 'youpayroll-aps-cron-pdb'
  minAvailable: 0%

deployment:
  name: 'youpayroll-aps-cron-deployment'
  replicas: 1
  maxSurge: 100%
  maxUnavailable: 0%
  serviceAccountName: 'ygag-youpayroll-aps-vault'

  containers:
    default:
      name: 'cron'
      imagePullPolicy: 'Always'
      image: '459037613883.dkr.ecr.ap-south-1.amazonaws.com/production/ygag/youpayroll-aps/backend-app:[BUILD_TAG]'
      command: '["sh", "-c", "source /vault/secrets/application.env ; source /vault/secrets/application-devops.env ; sh /ygag/deployment/app/cron-entrypoint.sh"]'
      env:
        - name: 'DJANGO_SETTINGS_MODULE'
          value: 'youpayroll.settings.sandbox'
      memory:
        requests: 200Mi
        limits: 300Mi
      cpu:
        requests: 50m
      volumeMounts:
        - mountPath: '/ygag/logs/'
          name: 'ygag-youpayroll-aps-sandbox-cron-logs'
        - name: 'youpayroll-aps-app-env-volume'
          mountPath: "/vault/secrets"


  volumes:
    - name: 'ygag-youpayroll-aps-sandbox-cron-logs'
      hostPath:
        path: '/home/ec2-user/ygag-logs/ygag-youpayroll-aps-sandbox/cron'
    - name: 'youpayroll-aps-app-env-volume'
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "youpayroll-aps-envs"

    
    

  nodeSelector:
    key: 'karpenter.sh/nodepool'
    value: 'default'

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: 'topology.kubernetes.io/zone'
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: 'youpayroll-aps'
          tier: cron

  priorityClassName: 'sandbox-medium'
  terminationGracePeriodSeconds: 60
