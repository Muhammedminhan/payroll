namespace: 'youpayroll-aps'

app_name: 'youpayroll-aps'
environment: 'production'

service:
  name: 'youpayroll-aps-worker'
  default:
    port: 8000
    protocol: 'TCP'
    targetPort: 8000

hpa:
  name: 'youpayroll-aps-worker-hpa'
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

pdb:
  name: 'youpayroll-aps-worker-pdb'
  minAvailable: 50%

deployment:
  name: 'youpayroll-aps-worker-deployment'
  replicas: 1
  maxSurge: 100%
  maxUnavailable: 0%
  serviceAccountName: 'ygag-youpayroll-aps-vault'

  containers:
    default:
      name: 'worker'
      imagePullPolicy: 'Always'
      image: '459037613883.dkr.ecr.ap-south-1.amazonaws.com/production/ygag/youpayroll-aps/backend-app:[BUILD_TAG]'
      command: '["sh", "-c", "source /vault/secrets/application.env ; source /vault/secrets/application-devops.env ; sh /ygag/deployment/app/worker-entrypoint.sh"]'
      env:
        - name: 'DJANGO_SETTINGS_MODULE'
          value: 'youpayroll.settings.production'
      memory:
        requests: 300Mi
        limits: 400Mi
      cpu:
        requests: 150m
      volumeMounts:
        - mountPath: '/ygag/logs/'
          name: 'ygag-youpayroll-aps-production-worker-logs'
        - name: 'youpayroll-aps-app-env-volume'
          mountPath: "/vault/secrets"


  volumes:
    - name: 'ygag-youpayroll-aps-production-worker-logs'
      hostPath:
        path: '/home/ec2-user/ygag-logs/ygag-youpayroll-aps-production/worker'
    - name: 'youpayroll-aps-app-env-volume'
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "youpayroll-aps-envs"

  nodeSelector:
    key: 'karpenter.sh/nodepool'
    value: 'default'

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: 'topology.kubernetes.io/zone'
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: 'youpayroll-aps'
          tier: worker
    - maxSkew: 1
      topologyKey: 'kubernetes.io/hostname'
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: 'youpayroll-aps'
          tier: worker

  priorityClassName: 'production-medium'
  terminationGracePeriodSeconds: 60
